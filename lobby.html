     📄 lobby.html 最終提交版 (精準保留尺寸與字體)
     ========================================== -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOBBY</title>
    <!-- 引入全域共用樣式表 -->
    <link rel="stylesheet" href="theme.css">
    <style>
        .lobby-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            height: calc(100vh - 100px); 
            max-width: 800px; 
            margin-top: 40px; 
            border: 1px solid #b37446; 
            background: rgba(12,8,5,0.95); 
            padding: 40px; 
            text-align: center; 
            position: relative; 
            overflow: hidden;
            animation: breathe 5s infinite; 
        }

        .lobby-header-group { 
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
            opacity: 1;
            transform: translate(-50%, 0);
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        
        .lobby-header-group.fnf-hide { 
            opacity: 0 !important; 
            transform: translate(-50%, -20px) scale(0.95) !important; 
        }

        .lobby-title { 
            font-size: 32px; 
            color: #b37446; 
            margin: 0; 
            letter-spacing: 4px; 
            width: 100%;
            text-align: center !important;
            display: block;
        }

        .directory-box { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            position: relative; 
        }
        
        .dir-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            background: transparent; 
            padding: 22px 16px;       
            font-size: 20px;          
            font-weight: bold; 
            letter-spacing: 3px;      
            border: 1px solid #b37446;
            color: #b37446;
            text-transform: uppercase; 
            text-decoration: none; 
            position: relative; 
            transform-origin: center center; 
            transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease, background 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, color 0.2s ease; 
        }

        .dir-btn:hover { 
            background: #b37446; 
            color: #0c0805; 
            box-shadow: 0 0 20px rgba(179, 116, 70, 0.4); 
            transform: scale(1.04); 
        }
        
        /* 🎯 核心修正：讓 SERVERS 和 CHARACTERS 一起維持原本的明亮高亮色調 */
        .dir-btn:not(.lock-btn) {
            border-color: #b37446 !important;
            color: #b37446 !important;
            opacity: 1 !important;
        }

        /* 🎯 保持其餘未解鎖按鈕（LORES、PHOTOS、ABOUT US）的暗淡樣式 */
        .dir-btn.lock-btn {
            border-color: rgba(179, 116, 70, 0.2) !important;
            color: rgba(179, 116, 70, 0.25) !important;
        }
        .dir-btn.lock-btn:hover {
            background: transparent !important;
            color: rgba(179, 116, 70, 0.25) !important;
            box-shadow: none !important;
            transform: none !important;
            cursor: default;
        }
        
        .dir-btn.fnf-fade-out, .lock-system-btn.fnf-hide { 
            opacity: 0 !important; 
            transform: scale(0.85) !important; 
            pointer-events: none !important; 
        }
        
        .directory-box .dir-btn.fnf-fade-out {
            opacity: 0 !important;
            filter: brightness(0) !important;
            transform: scale(0.85) !important;
        }
        
        .dir-btn.fnf-selected { 
            pointer-events: none; 
            z-index: 99; 
            background: #b37446 !important;
            color: #0c0805 !important;
            box-shadow: 0 0 25px rgba(179, 116, 70, 0.6) !important;
        }
        
        .lock-system-btn { 
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: transparent;
            border: 1px solid #b37446;
            color: #b37446;
            padding: 8px 18px;
            font-size: 13px;
            font-family: "Times New Roman", serif !important;
            letter-spacing: 2px;
            text-decoration: none;
            text-transform: uppercase;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.2s ease, color 0.2s ease;
        }
        .lock-system-btn:hover {
            background: #b37446;
            color: #0c0805;
            box-shadow: 0 0 15px rgba(179, 116, 70, 0.3);
        }
        .lock-system-btn.fnf-hide {
            opacity: 0 !important;
            transform: translate(-50%, 20px) scale(0.95) !important;
        }
    </style>
</head>
<body>

    <div class="lobby-container">
        <div class="lobby-header-group" id="fnf-header">
            <h1 class="lobby-title">[ LOBBY ]</h1>
        </div>

        <div class="directory-box" id="fnf-box">
            <a onmouseenter="playHoverSound()" onclick="fnfNavigate(this, 'characters.html')" class="dir-btn">CHARACTERS</a>
            <a onmouseenter="playHoverSound()" onclick="fnfNavigate(this, 'lores.html')" class="dir-btn lock-btn">LORES</a>
            <a onmouseenter="playHoverSound()" onclick="fnfNavigate(this, 'photos.html')" class="dir-btn lock-btn">PHOTOS</a>
            
            <!-- 🎯 核心修正：移除了 lock-btn 樣式使其恢復高亮，並成功串接到你的 'servers.html' 頁面！ -->
            <a onmouseenter="playHoverSound()" onclick="fnfNavigate(this, 'servers.html')" class="dir-btn">SERVERS</a>
            
            <a onmouseenter="playHoverSound()" onclick="fnfNavigate(this, 'about.html')" class="dir-btn lock-btn">ABOUT US</a>
        </div>

        <a onclick="forceLockOut()" class="lock-system-btn" id="fnf-back">[ LOCK SYSTEM ]</a>
    </div>

    <script src="menu.js"></script>
    <script>
        function forceLockOut() {
            if (document.body) {
                document.body.style.opacity = "0";
                document.body.classList.remove("fade-in");
                document.body.classList.add("fade-out");
            }
            setTimeout(() => {
                window.location.replace("index.html");
            }, 450);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faction - Missing</title>
    <style>
        @import url('https://googleapis.com');
        * { font-family: "Times New Roman", Times, serif !important; }
        h1, p, .menu-link, .back-btn, .sub-status { font-family: "EB Garamond", serif !important; text-transform: uppercase !important; letter-spacing: 1.5px !important; }
        body { background: #0c0805; color: #b37446; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; box-sizing: border-box; overflow: hidden; transition: opacity 0.4s; opacity: 1; cursor: crosshair; }
        .menu-container { text-align: center; border: 1px dashed #ffb066; padding: 40px; background: rgba(12, 8, 5, 0.95); max-width: 550px; width: 90%; box-shadow: 0 0 15px rgba(255, 176, 102, 0.1); }
        h1 { font-size: 26px; margin: 0 0 10px 0; font-weight: bold; color: #ffb066; }
        p { font-size: 14px; opacity: 0.7; margin: 0 0 35px 0; }
        .menu-options { display: flex; flex-direction: column; gap: 14px; align-items: center; width: 100%; }
        .menu-link { display: block; width: 80%; border: 1px solid #b37446; color: #b37446; padding: 12px 20px; font-size: 15px; font-weight: bold; text-decoration: none; text-align: center; box-sizing: border-box; opacity: 0.2; cursor: not-allowed; }
        .sub-status { display: block; font-size: 11px; font-weight: normal; margin-top: 3px; opacity: 0.6; }
        .back-btn { display: inline-block; margin-top: 30px; font-size: 14px; color: #b37446; border-bottom: 1px dashed #b37446; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>[ MISSING REGISTRY ]</h1>
        <p>Searching database for lost individuals...</p>
        <div class="menu-options">
            <a class="menu-link">Awaiting Subject Data <span class="sub-status">[ SYSTEM OFFLINE ]</span></a>
        </div>
        <a onclick="fadeTo('characters.html')" class="back-btn">< BACK TO CATEGORIES</a>
    </div>
    <script>
        const playSound = () => { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(), gain = ctx.createGain(); osc.type = 'triangle'; osc.frequency.setValueAtTime(240, ctx.currentTime); gain.gain.setValueAtTime(0.05, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1); } catch(e) {} };
        document.addEventListener("mousedown", (e) => { if (!e.target.closest('.back-btn')) playSound(); });
        function fadeTo(url) { playSound(); document.body.style.opacity = "0"; setTimeout(() => window.location.href = url, 400); }
    </script>
</body>
</html>

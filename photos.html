<!://><html lang="en"><head><meta charset="UTF-8"><title>DATABASE - Album</title><link rel="stylesheet" href="theme.css"><style>@import url('https://googleapis.com');*{font-family:"Times New Roman",serif!important;box-sizing:border-box!important;}h1,h2,h3,.nav-btn,.book-title,.chapter-num,.page-btn,.photo-caption,.lb-cap {font-family:"EB Garamond",serif!important;text-transform:uppercase!important;letter-spacing:1.5px!important;}body {background:#0c0805;color:#b37446;margin:0;padding:20px 40px;display:flex;flex-direction:column;align-items:center;height:100vh;opacity:0;transition:opacity .45s cubic-bezier(.16,1,.3,1)!important;overflow:hidden;}#global-nav {display:flex;flex-direction:column;gap:8px;align-items:center;width:100%;margin-bottom:20px;}.nav-btn {text-align:center;white-space:nowrap;background:transparent;border:1px solid #b37446;color:#b37446;padding:6px 20px;font-size:13px;font-weight:bold;cursor:pointer;text-decoration:none;transition:all .3s ease;}.nav-btn:hover {background:#b37446;color:#0c0805;box-shadow:0 0 15px rgba(179,116,70,.4);}.wiki-container {width:100%;height:calc(100vh - 120px);border:1px solid #b37446;background:rgba(12,8,5,.95);padding:35px;animation:breathe 5s infinite;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}.chapter-num {font-size:13px;color:rgba(179,116,70,.5);margin-bottom:5px;display:block;}.book-title {font-size:26px;color:#fff;margin:0 0 25px 0;border-bottom:1px solid #b37446;padding-bottom:10px;}
        
        /* 🎯 核心修正 1：加上 overflow-x: hidden 徹底在物理層面蒸發難看的橫向橘色大滾動條 */
        .album-grid {
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px; /* 微調間距 */
            flex:1;
            overflow-y:auto;  /* 允許上下滾動 */
            overflow-x:hidden !important; /* 👈 物理蒸發橫向橘條 */
            padding:5px;
            align-content:start;
        }.album-grid::-webkit-scrollbar {width:4px;}.album-grid::-webkit-scrollbar-thumb {background:#b37446;border-radius:2px;}
        
        .photo-item-box {
            border:1px solid rgba(179,116,70,.3);
            background:#000;
            padding:10px;
            display:flex;
            flex-direction:column;
            justify-content:center!important;
            align-items:center!important;
            gap:8px;
            transition:all .25s ease;
            cursor:pointer;
        }
        .photo-item-box:hover {border-color:#b37446;box-shadow:0 0 15px rgba(179,116,70,.2);transform:scale(1.03);}
        
        /* 🎯 核心修正 2：微調縮圖高度（180px ➔ 145px），讓上3張、下3張能極度工整、不擁擠地完美收納在黑框視窗內 */
        .album-photo {
            width:100%;
            height:145px;
            object-fit:cover;
            object-position:center center!important;
            border:1px solid rgba(179,116,70,.1);
            background:#111;
        }
        
        .photo-caption {font-size:12px;color:#fff;font-weight:bold;text-align:center;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;margin-top:2px;}
        .book-controls {display:flex;justify-content:space-between;align-items:center;border-top:1px dashed rgba(179,116,70,.2);padding-top:20px;margin-top:15px;}.page-btn {background:transparent;border:1px solid #b37446;color:#b37446;padding:8px 22px;font-size:12px;font-weight:bold;cursor:pointer;transition:all .2s;}.page-btn:hover:not(:disabled) {background:#b37446;color:#0c0805;box-shadow:0 0 15px rgba(179,116,70,.3);}.page-btn:disabled {opacity:.15;cursor:not-allowed;border-color:rgba(179,116,70,.2);color:rgba(179,116,70,.3);}.page-number-display {font-family:"EB Garamond",serif!important;font-size:14px;color:#b37446;letter-spacing:2px;font-weight:bold;}.lb-overlay {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.96);z-index:999;display:none;opacity:0;transition:opacity .3s;flex-direction:column;align-items:center;justify-content:center;padding:40px;cursor:zoom-out;}.lb-img {max-width:90%;max-height:80vh;border:1px solid #b37446;padding:5px;background:#000;box-shadow:0 0 25px rgba(179,116,70,.25);}.lb-cap {color:#fff;font-size:15px;margin-top:15px;text-align:center;letter-spacing:1px;}@keyframes breathe {0%,100% {box-shadow:0 0 15px rgba(179,116,70,.15);}50% {box-shadow:0 0 35px rgba(179,116,70,.45);}}</style></head><body>

    <div id="global-nav"><a onclick="fadeToLobby()" class="nav-btn" style="cursor:pointer;">< RETURN TO LOBBY</a></div>

    <div class="wiki-container">
        <div><span class="chapter-num" id="archive-vol">[ ARCHIVE LOG // VOL. 01 ]</span><h1 class="book-title" id="archive-title">PLAY LOGS</h1></div>
        <div id="album-grid" class="album-grid"></div>
        <div class="book-controls">
            <button id="btn-prev" class="page-btn" onclick="changePage(-1)" disabled>< PREV PAGE</button>
            <div id="page-num" class="page-number-display">PAGE 1 / 1</div>
            <button id="btn-next" class="page-btn" onclick="changePage(1)">NEXT PAGE ></button>
        </div>
    </div>

    <div id="lb-view" class="lb-overlay" onclick="closeLb()"><img id="lb-src" class="lb-img" src=""><div id="lb-cap" class="lb-cap"></div></div>

<script>
    const albumPages = [
        {
            vol: "01", title: "Game Night Memories",
            photos: [
                { img: "photos/photo1.png", text: "NIGHT SHIFT TEAM" },
                { img: "photos/photo2.png", text: "BOT WIRING ACTIVE" },
                { img: "photos/photo3.png", text: "4/20 MODE CLUTCH" },
                { img: "photos/photo4.png", text: "CUSTOM SERVER RUN" },
                { img: "photos/photo5.png", text: "FREDDY JUMPSCARED US" },
                { img: "photos/photo6.png", text: "BONNIE DIARY" }
            ]
        },
        {
            vol: "02", title: "Survival Archives",
            photos: [
                { img: "photos/photo7.png", text: "FOXY RUNNING" },
                { img: "photos/photo8.png", text: "1% POWER CLUTCH" }
            ]
        }
    ];

    let curPage = 1; const totalPages = albumPages.length;
    const grid = document.getElementById('album-grid'), ovr = document.getElementById('lb-view'), lSrc = document.getElementById('lb-src'), lCap = document.getElementById('lb-cap');

    function renderPage(pageIndex) {
        const pageData = albumPages[pageIndex - 1];
        document.getElementById('archive-vol').innerText = `[ ARCHIVE LOG // VOL. ${pageData.vol} ]`;
        document.getElementById('archive-title').innerText = pageData.title;

        grid.style.opacity = "0";
        grid.style.transition = "opacity 0.2s ease-out";
        
        setTimeout(() => {
            let hBuf = "";
            pageData.photos.forEach(p => {
                hBuf += `<div class="photo-item-box" onclick="openLb(this)">
                            <img src="${p.img}" class="album-photo" onerror="this.src='pfp/pfp1.png';">
                            <div class="photo-caption">${p.text}</div>
                         </div>`;
            });
            grid.innerHTML = hBuf; grid.style.opacity = "1";
        }, 150);

        document.getElementById('page-num').innerText = `PAGE ${pageIndex} / ${totalPages}`;
        document.getElementById('btn-prev').disabled = (pageIndex === 1);
        document.getElementById('btn-next').disabled = (pageIndex === totalPages);
    }

    const openLb = (box) => {
        lSrc.src = box.querySelector('.album-photo').src;
        lCap.innerText = box.querySelector('.photo-caption').innerText;
        ovr.style.display = 'flex';
        setTimeout(() => ovr.style.opacity = "1", 10);
    };
    const closeLb = () => {
        ovr.style.opacity = "0";
        setTimeout(() => ovr.style.display = 'none', 300);
    };

    window.addEventListener('DOMContentLoaded', () => { document.body.style.opacity = "1"; renderPage(curPage); });
    function fadeToLobby() { if (document.body) document.body.style.opacity = "0"; setTimeout(() => window.location.href = "lobby.html", 450); }
    function changePage(dir) { curPage += dir; renderPage(curPage); }
</script></body></html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATABASE Terminal - Holly Callahan</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        .wiki-container {
            width: 100%;
            height: calc(100vh - 180px);
            border: 1px solid #9e3b30;
            background: rgba(12,8,5,0.95);
            padding: 25px;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.98);
            animation: redBreathe 5s infinite, pageFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        #global-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(-15px);
            animation: topFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
        }

        .nav-status-group {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            width: 100%;
            border: 1px dashed rgba(158, 59, 48, 0.2);
            padding: 4px;
        }

        .nav-btn {
            flex: 1;
            text-align: center;
            white-space: nowrap;
            background: transparent;
            border: 1px solid #9e3b30;
            color: #9e3b30;
            padding: 6px 4px;
            font-size: 11px;
            font-weight: bold;
            margin: 0 3px;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
        }

        .nav-btn:hover, .nav-btn.active {
            background: #ff3333;
            border-color: #ff3333;
            color: #0c0805;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
        }

        .submenu-btn {
            flex: none;
            width: auto;
            padding: 4px 15px;
            margin-bottom: 4px;
        }

        .wiki-infobox {
            flex: 0 0 320px;
            background: #000;
            border: 1px solid #9e3b30;
            height: 100%;
            overflow-y: auto;
            padding: 15px;
            text-align: center;
        }

        .infobox-title {
            font-size: 18px;
            font-weight: bold;
            padding: 8px;
            margin-bottom: 15px;
            border-bottom: 1px solid #9e3b30;
        }

        .infobox-table td.label {
            font-weight: bold;
            color: #9e3b30;
            width: 40%;
        }

        .lore-content-area::-webkit-scrollbar-thumb {
            background: #9e3b30;
            border-radius: 2px;
        }

        .collapsible-header {
            font-size: 18px;
            color: #9e3b30;
            border-bottom: 1px solid #9e3b30;
            padding-bottom: 4px;
            margin: 20px 0 10px 0;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .collapsible-header:hover {
            color: #ffffff;
            border-bottom: 1px solid #ffffff;
        }

        .quote-block {
            border-left: 3px solid #9e3b30;
            padding-left: 15px;
            font-style: italic;
            margin: 20px 0;
            color: #fff;
            font-size: 14px;
        }

        @keyframes redBreathe { 
            0%, 100% { box-shadow: 0 0 15px rgba(158, 59, 48, 0.15); } 
            50% { box-shadow: 0 0 35px rgba(158, 59, 48, 0.45); } 
        }
        @keyframes pageFadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes topFadeIn { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0px); } }
    </style>
</head>
<body>

    <nav id="global-nav"></nav>

    <div class="wiki-container">
        <div class="wiki-layout" id="view-layout"></div>
    </div>

    <!-- 💡 直接載入外部獨立的資料檔案，不重複塞死資料 -->
    <script src="data-holly.js"></script>
    <script src="menu.js"></script>
    <script src="nav.js"></script>
</body>
</html>

<!://><html lang="en"><head><meta charset="UTF-8"><title>SERVERS</title><link rel="stylesheet" href="theme.css"><style>@import url('https://googleapis.com');* {font-family:"Times New Roman",serif!important;box-sizing:border-box!important;}h1,h2,h3,.nav-btn,.panel-title,.msg-user,.gif-placeholder-text,.member-name,.send-btn {font-family:"EB Garamond",serif!important;text-transform:uppercase!important;letter-spacing:1.5px!important;}body {background:#0c0805;color:#b37446;margin:0;padding:20px 40px;display:flex;flex-direction:column;align-items:center;height:100vh;opacity:0;transition:opacity .45s cubic-bezier(.16,1,.3,1)!important;overflow:hidden;}#global-nav {display:flex;flex-direction:column;gap:8px;align-items:center;width:100%; margin-bottom:20px;}.nav-btn {text-align:center;white-space:nowrap;background:transparent;border:1px solid #b37446;color:#b37446;padding:6px 20px;font-size:13px;font-weight:bold;cursor:pointer;text-decoration:none;transition:all .3s ease;}.nav-btn:hover {background:#b37446;color:#0c0805;box-shadow:0 0 15px rgba(179,116,70,.4);}.wiki-container {width:100%;height:calc(100vh - 120px);border:1px solid #b37446;background:rgba(12,8,5,.95);padding:25px;animation:breathe 5s infinite;overflow:hidden;}.chat-layout {display:flex;gap:30px;height:100%;}.chat-sidebar,.member-sidebar {flex:0 0 240px;background:#000;border:1px solid #b37446;height:100%;padding:20px;display:flex;flex-direction:column;justify-content:space-between;}.member-sidebar {flex:0 0 250px;justify-content:flex-start;}.panel-title {font-size:20px;color:#fff;border-bottom:1px solid #b37446;padding-bottom:10px;margin-bottom:15px;text-align:center;}.terminal-log {font-size:14px;color:#d19a6a;line-height:1.6;white-space:pre-line;}.chat-feed-area {flex:1;border:1px solid #b37446;background:#000;height:100%;padding:25px;display:flex;flex-direction:column;}.message-log,.member-list-box {flex:1;overflow-y:auto;padding-right:10px;display:flex;flex-direction:column;gap:16px;}.member-list-box {gap:14px;padding-right:5px;margin-top:5px;}.message-log::-webkit-scrollbar,.member-list-box::-webkit-scrollbar {width:4px;}.message-log::-webkit-scrollbar-thumb,.member-list-box::-webkit-scrollbar-thumb {background:#b37446;border-radius:2px;}.member-item {display:flex;align-items:center;gap:12px;border-bottom:1px dashed rgba(179,116,70,.08);padding-bottom:8px;}.member-avatar {width:32px;height:32px;border-radius:50%;border:1px solid rgba(179,116,70,.4);background:#111;object-fit:cover;}.member-info-meta {display:flex;flex-direction:column;gap:1px;}.member-name {font-size:14px;font-weight:bold;color:#fff;letter-spacing:1px;}.member-status-tag {font-size:10px;font-weight:bold;}.status-online {color:#00e676;text-shadow:0 0 5px rgba(0,230,118,.3);}.status-idle {color:#ffaa00;}.status-dnd {color:#ff3333;}.status-offline {color:#b37446;opacity:.4;}.input-control-panel {display:flex;gap:15px;margin-top:20px;border-top:1px dashed rgba(179,116,70,.3);padding-top:15px;}.terminal-input {flex:1;background:#000!important;border:1px solid rgba(179,116,70,.5)!important;color:#fff!important;padding:10px 15px!important;font-size:14px!important;outline:none!important;text-transform:none!important;font-variant:normal!important;letter-spacing:normal!important;-webkit-text-security:none!important;user-select:text!important;-webkit-user-select:text!important;}.terminal-input:focus {border-color:#b37446!important;box-shadow:0 0 10px rgba(179,116,70,.2)!important;}.send-btn {background:transparent;border:1px solid #b37446;color:#b37446;padding:0 25px;font-size:13px;font-weight:bold;cursor:pointer;}.send-btn:hover {background:#b37446;color:#0c0805;box-shadow:0 0 10px rgba(179,116,70,.4);}.msg {font-size:15px;line-height:1.4;color:#d19a6a;animation:scanline .2s ease-out;display:flex;flex-direction:column;align-items:flex-start;}.msg-header {display:flex;align-items:baseline;margin-bottom:2px;}.msg-time {color:rgba(179,116,70,.4);margin-right:10px;font-size:13px;}.msg-user {color:#fff;font-weight:bold;margin-right:10px;font-size:16px;text-shadow:0 0 3px rgba(255,255,255,.1);}.msg-content {color:#b37446;white-space:pre-wrap;word-break:break-all;}.msg-media-group {display:flex;flex-direction:column;gap:8px;margin-top:6px;margin-left:5px;}.msg-img,.gif-placeholder-box {max-width:320px;max-height:240px;object-fit:contain;border:1px solid rgba(179, 116, 70, 0.4);padding:4px;background:#000;}.gif-placeholder-box {width:320px;height:120px;border-style:dashed;display:flex;align-items:center;justify-content:center;padding:15px;box-shadow:inset 0 0 15px rgba(179, 116, 70, 0.05);}.gif-placeholder-text {color:rgba(179, 116, 70, 0.5);font-size:13px;font-weight:bold;text-align:center;line-height:1.5;letter-spacing:2px;text-shadow:0 0 5px rgba(179, 116, 70, 0.2);}@keyframes breathe {0%,100% {box-shadow:0 0 15px rgba(179,116,70,.15);}50% {box-shadow:0 0 35px rgba(179,116,70,.45);}}@keyframes scanline {from {opacity:0;transform:translateY(5px);}to {opacity:1;transform:translateY(0);}}</style></head><body><div id="global-nav"><a onclick="fOut()" class="nav-btn" style="cursor:pointer;">< RETURN TO LOBBY</a></div><div class="wiki-container"><div class="chat-layout"><div class="chat-sidebar"><div><div class="panel-title">DISCORD</div><div class="terminal-log">[ STATUS ]: <span id="conn-status" style="color:#ff3333;font-weight:bold;">OFFLINE</span><br>[ VERSION ]: CUSTOM.V1<br>[ MODE ]: READ & TEXT<br>--- LOG DESCRIPTION ---<br>Display real-time chats.</div></div><div style="font-size:11px;opacity:.5;text-align:center;">https://discord.gg/yB7DkjDZxB</div></div><div class="chat-feed-area"><div class="message-log" id="chat-box"></div><div class="input-control-panel">
    <!-- 🎯 終極修正：加入 3 個 stopPropagation 物理防護盾，物理斬斷外圍腳本的死鎖攔截，強行逼瀏覽器放行打字！ -->
    <input type="text" id="t-in" class="terminal-input" placeholder="ENTER MESSAGE..." autocomplete="off" onkeydown="event.stopPropagation()" onkeyup="event.stopPropagation()" onkeypress="event.stopPropagation()">
    <button onclick="sMsg()" class="send-btn">ENTER </button>
</div></div><div class="member-sidebar"><div class="panel-title">MEMBERS</div><div class="member-list-box" id="m-box"></div></div></div></div><script>const $=(id)=>document.getElementById(id),box=$('chat-box'),mBox=$('m-box'),stat=$('conn-status'),inp=$('t-in');let ws;window.onload=()=>document.body.style.opacity="1";const sMsg=()=>{let t=inp.value.trim();if(t&&ws.readyState==1){ws.send(JSON.stringify({type:'WEB_SEND_MSG',user:'GUEST',content:t}));inp.value='';}};
    // 🎯 這裡同步加上防護
    inp.addEventListener('keydown',(e)=>{e.stopPropagation();if(e.key=='Enter')sMsg();});
    function conn(){ws=new WebSocket('ws://127.0.0.1:8080');ws.onopen=()=>{stat.textContent='ONLINE';stat.style.color='#00e676';ws.send(JSON.stringify({type:'REQUEST_MEMBERS'}));};ws.onclose=()=>{stat.textContent='OFFLINE';stat.style.color='#ff3333';setTimeout(conn,3000);};ws.onmessage=(e)=>{let d=JSON.parse(e.data);if(d.author=='SYSTEM'&&d.content!='SECURE LINK ESTABLISHED.')return;if(d.type=='MEMBERS_LIST'){mBox.innerHTML='';let sc={online:4,idle:3,dnd:2,offline:1};d.members.sort((a,b)=>sc[b.status]-sc[a.status]).forEach(m=>{let f=m.status=='offline',t='[ ALIVE ]',c='status-online';if(m.status=='idle'){t='[ IDLE ]';c='status-idle';}else if(m.status=='dnd'){t='[ DND ]';c='status-dnd';}else if(f){t='[ OFFLINE ]';c='status-offline';}mBox.innerHTML+=`<div class="member-item"><img src="${m.pfp}" class="member-avatar" style="${f?'opacity:.3;filter:grayscale(1);':''}" onerror="this.src='https://discordapp.com';"><div class="member-info-meta"><div class="member-name" style="${f?'opacity:.4;':''}">${m.name}</div><div class="member-status-tag ${c}">${t}</div></div></div>`;});}else if(d.type=='CHAT_MSG'||d.content){let m=document.createElement('div');m.className='msg';let h=`<div class="msg-header">${d.timestamp?`<span class="msg-time">[${d.timestamp}]</span>`:''} <span class="msg-user">${d.author}:</span> ${d.content?`<span class="msg-content">${d.content}</span>`:''}</div>`;if((d.images&&d.images.length)||(d.gifs&&d.gifs.length)){h+=`<div class="msg-media-group">`;if(d.images)d.images.forEach(u=>h+=`<img src="${u}" class="msg-img" onerror="this.style.display='none';">`);if(d.gifs)d.gifs.forEach(()=>h+=`<div class="gif-placeholder-box"><div class="gif-placeholder-text">[SYSTEM]<br>IT'S A GIF I CAN'T GET.</div></div>`);h+=`</div>`;}m.innerHTML=h;box.appendChild(m);box.scrollTop=box.scrollHeight;}};};conn();const fOut=()=>{document.body.style.opacity="0";setTimeout(()=>window.location.href="lobby.html",450);};</script></body></html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 💡 核心修正：將 characters.html 的分頁標題精準更換為大寫的 CHARACTERS -->
    <title>CHARACTERS</title>
    <!-- 引入全域共用樣式表 -->
    <link rel="stylesheet" href="theme.css">
    <style>
        body{
            margin:0;
            min-height:100vh;
            background:radial-gradient(ellipse at center, #1a1210 0%, #050302 70%, #000 100%);
            overflow-x:hidden;
            position:relative;
        }

        /* 監視器掃描線 */
        .scanlines{
            position:fixed;
            inset:0;
            pointer-events:none;
            z-index:16;
            background:repeating-linear-gradient(
                to bottom,
                rgba(0,0,0,0.45) 0px,
                rgba(0,0,0,0.45) 1px,
                transparent 2px,
                transparent 3px
            );
            animation:scanlineFlicker 6s infinite;
        }
        @keyframes scanlineFlicker{
            0%,100%{opacity:0.55;}
            48%{opacity:0.55;}
            50%{opacity:0.3;}
            52%{opacity:0.55;}
            76%{opacity:0.4;}
            78%{opacity:0.55;}
        }

        /* CRT 暈影(邊角變暗) */
        .crt-vignette{
            position:fixed;
            inset:0;
            pointer-events:none;
            z-index:15;
            background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
        }

        /* 底層雜訊顆粒 */
        .static-noise{
            position:fixed;
            inset:0;
            pointer-events:none;
            z-index:17;
            opacity:0.08;
            background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
            animation:noiseShift .2s steps(2) infinite;
        }
        @keyframes noiseShift{
            0%{transform:translate(0,0);}
            50%{transform:translate(-1%,1%);}
            100%{transform:translate(1%,-1%);}
        }

        /* 偶發畫面故障(glitch)，由 JS 隨機觸發 */
        .glitch-layer{
            position:fixed;
            inset:0;
            pointer-events:none;
            z-index:20;
            opacity:0;
            background:repeating-linear-gradient(
                to bottom,
                rgba(255,60,60,0.12) 0px, rgba(255,60,60,0.12) 2px,
                rgba(80,220,255,0.1) 2px, rgba(80,220,255,0.1) 4px,
                transparent 4px, transparent 8px
            );
        }
        .glitch-layer.glitch-active{
            animation:glitchBurst .28s steps(3,end) 1;
        }
        @keyframes glitchBurst{
            0%{opacity:0;transform:translate(0,0);}
            15%{opacity:0.55;transform:translate(-8px,1px);filter:hue-rotate(15deg);}
            30%{opacity:0.35;transform:translate(6px,-2px);filter:hue-rotate(-10deg);}
            45%{opacity:0.5;transform:translate(-4px,2px);}
            60%{opacity:0;transform:translate(0,0);}
            100%{opacity:0;}
        }

        .lobby-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: calc(100vh - 100px); height: calc(100dvh - 100px); max-width: 800px; margin-top: 40px; border: 1px solid #b37446; background: rgba(12,8,5,0.95); padding: 40px; text-align: center; animation: breathe 5s infinite; position: relative; overflow: hidden; box-sizing: border-box; z-index: 7; }
        @keyframes breathe{
            0%,100%{box-shadow:0 0 25px rgba(179,116,70,0.15) inset;}
            50%{box-shadow:0 0 45px rgba(179,116,70,0.3) inset;}
        }
        .lobby-header-group { transition: opacity 0.2s ease, transform 0.2s ease; }
        .lobby-header-group.fnf-hide { opacity: 0 !important; transform: translateY(-20px) scale(0.95) !important; }
        .lobby-title { font-size: 32px; color: #e5bd9c; margin: 0 0 10px 0; letter-spacing: 4px; display: block; width: 100%; text-align: center; }
        .lobby-subtitle { font-size: 14px; color: #8c7361; margin: 0; letter-spacing: 1.5px; text-transform: uppercase; display: block; width: 100%; text-align: center; }
        
        .directory-box { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 500px; margin: 0 auto; position: relative; }
        
        /* 20px PC 使用者規格方框 */
        .dir-btn { display: flex; align-items: center; justify-content: center; width: 100%; background: transparent; padding: 22px 16px; font-size: 20px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; position: relative; transform-origin: center center; transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease, background 0.2s ease, box-shadow 0.2s ease; }
        .btn-alive { border: 1px solid #00e676; color: #00e676; }
        .btn-alive:hover { background: #00e676; color: #0c0805; box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); transform: scale(1.04); }
        .btn-dead { border: 1px solid #ff3333; color: #ff3333; }
        .btn-dead:hover { background: #ff3333; color: #0c0805; box-shadow: 0 0 20px rgba(255, 51, 51, 0.4); transform: scale(1.04); }
        .btn-missing { border: 1px solid #b37446; color: #b37446; }
        .btn-missing:hover { background: #b37446; color: #0c0805; box-shadow: 0 0 20px rgba(179, 116, 70, 0.4); transform: scale(1.04); }
        .dir-btn.lock-btn { border-color: rgba(179,116,70,0.2) !important; color: rgba(179,116,70,0.25) !important; cursor: default !important; pointer-events: none !important; }
        .dir-btn.lock-btn:hover { background: transparent !important; color: rgba(179,116,70,0.25) !important; box-shadow: none !important; transform: none !important; }
        
        /* 未選中按鈕與返回鍵縮小淡出 */
        .dir-btn.fnf-fade-out, .back-lobby-btn.fnf-hide { opacity: 0 !important; transform: scale(0.85) !important; pointer-events: none !important; }
        .dir-btn.fnf-selected { pointer-events: none; z-index: 99; filter: brightness(1.3); }
        
        .back-lobby-btn { 
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #8c7361; 
            font-size: 12px; 
            letter-spacing: 1.5px; 
            text-decoration: none; 
            border-bottom: 1px dashed transparent; 
            opacity: 1;
            z-index: 10;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.2s ease; 
            text-transform: uppercase; 
        }
        .back-lobby-btn:hover { color: #e5bd9c; border-bottom-color: #e5bd9c; }
        
        /* 點擊確認時，底部返回鍵會微微向下移動並絲滑淡出 */
        .back-lobby-btn.fnf-hide { 
            opacity: 0 !important; 
            transform: translate(-50%, 20px) scale(0.95) !important; 
            pointer-events: none !important; 
        }

        /* ===== 手機版適配 ===== */
        @media (max-width:600px){
            .lobby-container{
                width:92%;
                height:calc(100dvh - 60px);
                margin-top:30px;
                padding:80px 20px 70px;
            }
            .lobby-title{
                font-size:24px;
                letter-spacing:3px;
            }
            .lobby-subtitle{
                font-size:12px;
                letter-spacing:1px;
            }
            .directory-box{
                gap:14px;
                max-width:100%;
            }
            .dir-btn{
                font-size:16px;
                letter-spacing:2px;
                padding:16px 12px;
                min-height:48px;
            }
            .back-lobby-btn{
                bottom:20px;
                font-size:11px;
                letter-spacing:1px;
            }
        }

        @media (max-width:360px){
            .lobby-title{
                font-size:20px;
                letter-spacing:2px;
            }
            .dir-btn{
                font-size:14px;
                letter-spacing:1.5px;
            }
        }

        /* 觸控裝置：拿掉 hover 依賴的效果，改用 active 狀態即時反饋 */
        @media (hover:none) and (pointer:coarse){
            .btn-alive:active{ background:#00e676; color:#0c0805; box-shadow:0 0 20px rgba(0,230,118,0.4); transform:scale(1.04); }
            .btn-dead:active{ background:#ff3333; color:#0c0805; box-shadow:0 0 20px rgba(255,51,51,0.4); transform:scale(1.04); }
            .btn-missing:active{ background:#b37446; color:#0c0805; box-shadow:0 0 20px rgba(179,116,70,0.4); transform:scale(1.04); }
            .back-lobby-btn:active{ color:#e5bd9c; border-bottom-color:#e5bd9c; }
        }
    </style>
</head>
<body>

    <div class="crt-vignette"></div>
    <div class="scanlines"></div>
    <div class="static-noise"></div>
    <div class="glitch-layer" id="glitchLayer"></div>

    <div class="lobby-container">
        <!-- 頂部多層標題組 -->
        <div class="lobby-header-group" id="fnf-header">
            <h1 class="lobby-title">CHARACTERS</h1>
            <p class="lobby-subtitle">Select a category to research them.</p>
        </div>

        <div class="directory-box" id="fnf-box">
            <a onmouseenter="playHoverSound()" onclick="fnfNavigate(this, 'alive.html')" class="dir-btn btn-alive">[ALIVE]</a>
            <a onmouseenter="playHoverSound()" onclick="fnfNavigate(this, 'dead.html')" class="dir-btn btn-dead">[DEAD]</a>
            <a onmouseenter="playHoverSound()" onclick="fnfNavigate(this, 'missing.html')" class="dir-btn btn-missing lock-btn">[MISSING]</a>
        </div>

        <!-- 底部返回大廳按鈕 -->
        <a onclick="fadeTo('lobby.html')" class="back-lobby-btn" id="fnf-back">&lt; RETURN TO LOBBY</a>
    </div>

    <!-- 引入共用動效與音效引擎 -->
    <script src="menu.js"></script>
    <script>
        (function glitchLoop(){
            const layer = document.getElementById('glitchLayer');
            function triggerGlitch(){
                layer.classList.remove('glitch-active');
                void layer.offsetWidth; // 強制重新觸發動畫
                layer.classList.add('glitch-active');
            }
            function scheduleNext(){
                const delay = 4000 + Math.random()*6000; // 4~10秒隨機一次
                setTimeout(()=>{
                    triggerGlitch();
                    scheduleNext();
                }, delay);
            }
            scheduleNext();
        })();
    </script>
</body>
</html>

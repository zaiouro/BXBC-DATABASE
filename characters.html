<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Characters Menu</title>
    <style>
        /* ⚠️ 核心修改：在 body 加上與角色頁面完全一致的 pageFadeIn 淡入特效 */
        body { background-color: #0c0805; color: #b37446; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; box-sizing: border-box; overflow: hidden; transition: opacity 0.4s ease-in-out; opacity: 1; animation: pageFadeIn 0.4s ease-in-out forwards; }
        @keyframes pageFadeIn { from { opacity: 0; } to { opacity: 1; } }
        .menu-container { text-align: center; border: 1px solid #b37446; padding: 40px; background-color: rgba(12, 8, 5, 0.95); max-width: 550px; width: 90%; animation: breatheGlow 5s ease-in-out infinite; }
        .menu-container h1 { font-size: 24px; margin: 0 0 10px 0; letter-spacing: 2px; }
        .menu-container p { font-size: 13px; opacity: 0.7; margin: 0 0 35px 0; }
        .menu-options { display: flex; flex-direction: column; gap: 12px; align-items: center; width: 100%; }
        .menu-link { display: block; width: 80%; background-color: transparent; border: 1px solid #b37446; color: #b37446; padding: 12px 20px; font-family: inherit; font-size: 14px; font-weight: bold; text-decoration: none; letter-spacing: 1px; transition: opacity 0.4s ease-in-out; text-transform: uppercase; margin: 0 auto; }
        .menu-link:hover { opacity: 0.15; }
        .back-btn { display: inline-block; margin-top: 30px; font-size: 12px; color: #b37446; text-decoration: none; border-bottom: 1px dashed #b37446; padding-bottom: 2px; cursor: pointer; }
        .back-btn:hover { opacity: 0.5; }
        @keyframes breatheGlow { 0%, 100% { box-shadow: 0 0 15px rgba(179, 116, 70, 0.15); border-color: rgba(179, 116, 70, 0.5); } 50% { box-shadow: 0 0 35px rgba(179, 116, 70, 0.45); border-color: rgba(179, 116, 70, 1); } }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>CHARACTERS PROFILE</h1>
        <p>Select a character to research their stories.</p>
        <div class="menu-options">
            <!-- ⚠️ 這裡的按鈕連結改為觸發帶有淡出特效的 JavaScript 函數 -->
            <a href="javascript:void(0)" onclick="fadeTo('bonabi.html')" class="menu-link">Holly Callahan</a>
            <a href="javascript:void(0)" onclick="fadeTo('mangle.html')" class="menu-link">Trixie Sherman</a>
            <a href="javascript:void(0)" onclick="fadeTo('char3.html')" class="menu-link">Placeholder (Awaiting Data)</a>
            <a href="javascript:void(0)" onclick="fadeTo('char4.html')" class="menu-link">Placeholder (Awaiting Data)</a>
            <a href="javascript:void(0)" onclick="fadeTo('char5.html')" class="menu-link">Placeholder (Awaiting Data)</a>
            <a href="javascript:void(0)" onclick="fadeTo('char6.html')" class="menu-link">Placeholder (Awaiting Data)</a>
            <a href="javascript:void(0)" onclick="fadeTo('char7.html')" class="menu-link">Placeholder (Awaiting Data)</a>
        </div>
        <a href="javascript:void(0)" onclick="fadeTo('index.html')" class="back-btn">< RETURN TO LOBBY</a>
    </div>
    <script>
        function fadeTo(url) {
            document.body.style.opacity = "0";
            setTimeout(function() { window.location.href = url; }, 400);
        }
    </script>
</body>
</html>

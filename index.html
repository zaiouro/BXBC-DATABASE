<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ BXBC_DATABASE ]</title>
    <style>
        
        body {
            background-color: #0c0805; 
            color: #b37446;            
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        
        .container {
            text-align: center;
            border: 1px solid #b37446;
            padding: 35px;
            background-color: rgba(12, 8, 5, 0.9);
            max-width: 500px;
            width: 90%;
            
            
            animation: fadeInPanel 2s ease-in-out forwards, breatheGlow 4s ease-in-out infinite 2s;
            opacity: 0; 
        }

        
        @keyframes fadeInPanel {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
                box-shadow: 0 0 15px rgba(179, 116, 70, 0.15);
            }
        }

        
        @keyframes breatheGlow {
            0% {
                box-shadow: 0 0 15px rgba(179, 116, 70, 0.15);
                border-color: rgba(179, 116, 70, 0.6);
            }
            50% {
                box-shadow: 0 0 35px rgba(179, 116, 70, 0.45);
                border-color: rgba(179, 116, 70, 1);
            }
            100% {
                box-shadow: 0 0 15px rgba(179, 116, 70, 0.15);
                border-color: rgba(179, 116, 70, 0.6);
            }
        }
        
        
        .typewriter-text {
            min-height: 50px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        
        .cursor {
            display: inline-block;
            width: 10px;
            background-color: #b37446;
            animation: blink 0.8s infinite;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        
        input {
            background-color: #050302;
            border: 1px solid #b37446;
            color: #b37446;
            padding: 10px;
            font-size: 16px;
            text-align: center;
            outline: none;
            width: 60%;
        }

        
        button {
            background-color: #b37446;
            color: #0c0805;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #59351c;
            color: #b37446;
        }
        
        
        .error { color: #ff6666; margin-top: 15px; } 
        .success { color: #ffb066; margin-top: 15px; font-size: 16px; line-height: 1.6; } 
    </style>
</head>
<body>

    <div class="container">
        <h1>[ WAITING PROCESS... ]</h1>
        
        <div class="typewriter-text" id="storyText"></div>
        
        <input type="text" id="passwordInput" placeholder="Enter key...">
        
        <button onclick="checkPassword()">CLICK ME</button>

        <div id="message"></div>
    </div>

    <script>
        const textToType = "Find the key in #announcements and enter it:";
        let index = 0;
        const speed = 40; 

        function startTypewriter() {
            const target = document.getElementById("storyText");
            if (index < textToType.length) {
                if (textToType.charAt(index) === '\n') {
                    target.innerHTML += '<br>';
                } else {
                    target.innerHTML += textToType.charAt(index);
                }
                index++;
                setTimeout(startTypewriter, speed);
            } else {
                target.innerHTML += '<span class="cursor">&nbsp;</span>';
            }
        }

        window.onload = function() {
            setTimeout(startTypewriter, 500); 
        };

        function checkPassword() {
            const userInput = document.getElementById("passwordInput").value.toLowerCase().trim();
            const messageDiv = document.getElementById("message");
            const secretPassword = "save them"; 

            if (userInput === secretPassword) {
                messageDiv.className = "success";
                 
                messageDiv.innerHTML = "=== OVERRIDE SUCCESSFUL ===<br><br>Amazing.. I didn't expected that at all!<br>Now, let's hop into the profiles, shall we?<br><br><i>Loading Profiles...</i>";
                
                
                setTimeout(function() {
                    window.location.href = "lore.html"; 
                }, 3000);

            } else {
                messageDiv.className = "error";
                messageDiv.innerHTML = "[-] INVALID KEY. ACCESS DENIED.";
            }
        }
        
    </script>

</body>
</html>

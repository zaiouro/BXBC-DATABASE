<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MAIN MENU</title><link rel="stylesheet" href="theme.css">
<style>
body{
    margin:0;
    min-height:100vh;
    background:radial-gradient(ellipse at center, #1a1210 0%, #050302 70%, #000 100%);
    overflow-x:hidden;
    position:relative;
    transition:opacity .5s ease;
}
body.fade-out{opacity:0;}
body.fade-in{opacity:1;}

/* 恐怖霧氣層 */
.fog-layer{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    pointer-events:none;
    z-index:1;
    background:
        radial-gradient(circle at 20% 30%, rgba(179,116,70,0.10) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(179,116,70,0.09) 0%, transparent 50%);
    animation:fogDrift 18s ease-in-out infinite alternate;
}
@keyframes fogDrift{
    0%{transform:translate(0,0) scale(1);}
    100%{transform:translate(3%,-2%) scale(1.1);}
}

/* 漂浮灰燼/火星粒子 */
.ember{
    position:fixed;
    bottom:-10px;
    background:#e5bd9c;
    border-radius:50%;
    box-shadow:0 0 8px 3px rgba(229,189,156,0.8);
    opacity:0;
    pointer-events:none;
    z-index:10;
    animation:emberRise linear infinite;
}
@keyframes emberRise{
    0%{
        transform:translateY(0) translateX(0) scale(0.6);
        opacity:0;
    }
    10%{opacity:0.8;}
    50%{
        transform:translateY(-50vh) translateX(15px) scale(1);
        opacity:0.6;
    }
    90%{opacity:0.2;}
    100%{
        transform:translateY(-105vh) translateX(-10px) scale(0.4);
        opacity:0;
    }
}

.lobby-container{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    height:calc(100vh - 100px);
    height:calc(100dvh - 100px);
    max-width:800px;
    margin:40px auto 0;
    border:1px solid #b37446;
    background:rgba(12,8,5,0.95);
    padding:40px;
    text-align:center;
    position:relative;
    overflow:hidden;
    animation:breathe 5s infinite;
    font-family:"EB Garamond",serif!important;
    z-index:3;
    box-sizing:border-box;
}

.game-title{
    font-size:56px;
    color:#b37446;
    margin:0 0 60px;
    letter-spacing:8px;
    text-transform:uppercase;
    font-family:"EB Garamond",serif;
    position:relative;
    text-shadow:0 0 15px rgba(179,116,70,0.5),0 0 30px rgba(179,116,70,0.3);
    animation:titleFlicker 4s infinite;
}
@keyframes titleFlicker{
    0%,92%,100%{opacity:1;text-shadow:0 0 15px rgba(179,116,70,0.5),0 0 30px rgba(179,116,70,0.3);}
    93%{opacity:0.4;text-shadow:none;}
    94%{opacity:1;}
    95%{opacity:0.6;}
    96%{opacity:1;}
}

.menu-list{
    display:flex;
    flex-direction:column;
    gap:22px;
    align-items:center;
}

.menu-item{
    background:none;
    border:none;
    color:#8c7361;
    font-size:24px;
    letter-spacing:6px;
    text-transform:uppercase;
    font-family:"EB Garamond",serif;
    cursor:pointer;
    padding:8px 30px;
    position:relative;
    transition:all .3s ease;
}

.menu-item::before{
    content:"";
    position:absolute;
    left:50%;
    bottom:-2px;
    width:0%;
    height:1px;
    background:#b37446;
    transition:all .3s ease;
    transform:translateX(-50%);
}

.menu-item:hover{
    color:#e5bd9c;
    text-shadow:0 0 10px rgba(179,116,70,0.6);
    letter-spacing:9px;
}

.menu-item:hover::before{
    width:100%;
}

@keyframes breathe{
    0%,100%{box-shadow:0 0 25px rgba(179,116,70,0.15) inset;}
    50%{box-shadow:0 0 45px rgba(179,116,70,0.3) inset;}
}

/* ===== 手機版適配 ===== */
@media (max-width:600px){
    .lobby-container{
        width:92%;
        height:calc(100dvh - 60px);
        margin:30px auto 0;
        padding:30px 20px;
        border-width:1px;
    }
    .game-title{
        font-size:32px;
        letter-spacing:4px;
        margin:0 0 45px;
        line-height:1.3;
    }
    .menu-list{
        gap:14px;
        width:100%;
    }
    .menu-item{
        font-size:19px;
        letter-spacing:4px;
        padding:14px 20px;
        width:100%;
        min-height:48px;
    }
    .menu-item:hover{
        letter-spacing:5px;
    }
}

@media (max-width:360px){
    .game-title{
        font-size:26px;
        letter-spacing:3px;
    }
    .menu-item{
        font-size:17px;
        letter-spacing:3px;
    }
}

/* 觸控裝置：拿掉 hover 依賴的效果，改用 active 狀態即時反饋 */
@media (hover:none) and (pointer:coarse){
    .menu-item:active{
        color:#e5bd9c;
        text-shadow:0 0 10px rgba(179,116,70,0.6);
    }
    .menu-item:active::before{
        width:100%;
    }
}
</style>
</head>
<body class="fade-in">
<div class="fog-layer"></div>
<div id="ember-container"></div>

<div class="lobby-container">
    <h1 class="game-title">The Rust & Gears</h1>

    <div class="menu-list">
        <button class="menu-item" onclick="handleMenuClick('enter')">Enter</button>
        <button class="menu-item" onclick="handleMenuClick('options')">Options</button>
        <button class="menu-item" onclick="handleMenuClick('credits')">Credits</button>
        <button class="menu-item" onclick="handleMenuClick('exit')">Exit</button>
    </div>
</div>

<script src="menu.js"></script>
<script>
(function spawnEmbers(){
    const container = document.getElementById('ember-container');
    const count = window.innerWidth <= 600 ? 14 : 25;
    for(let i=0;i<count;i++){
        const ember = document.createElement('div');
        ember.className = 'ember';
        const left = Math.random()*100;
        const duration = 6 + Math.random()*8;
        const delay = Math.random()*10;
        const size = 2 + Math.random()*3;
        ember.style.left = left+'vw';
        ember.style.width = size+'px';
        ember.style.height = size+'px';
        ember.style.animationDuration = duration+'s';
        ember.style.animationDelay = delay+'s';
        container.appendChild(ember);
    }
})();

function playMenuHover(){
    try{
        const c=new(window.AudioContext||window.webkitAudioContext)(),n=c.currentTime;
        let o=c.createOscillator(),g=c.createGain();
        o.type='sine';o.frequency.setValueAtTime(180,n);
        g.gain.setValueAtTime(0.05,n);
        g.gain.exponentialRampToValueAtTime(0.001,n+0.2);
        o.connect(g);g.connect(c.destination);o.start();o.stop(n+0.2)
    }catch(e){}
}

function handleMenuClick(action){
    switch(action){
        case 'enter':
            document.body.classList.remove('fade-in');
            document.body.classList.add('fade-out');
            setTimeout(()=>{window.location.href="lobby.html"},500);
            break;
        case 'options':
            document.body.classList.remove('fade-in');
            document.body.classList.add('fade-out');
            setTimeout(()=>{window.location.href="options.html"},500);
            break;
        case 'credits':
            document.body.classList.remove('fade-in');
            document.body.classList.add('fade-out');
            setTimeout(()=>{window.location.href="credits.html"},500);
            break;
        case 'exit':
            window.close();
            break;
    }
}

document.querySelectorAll('.menu-item').forEach(btn=>{
    btn.addEventListener('mouseenter', playMenuHover);
});
</script>
</body>
</html>

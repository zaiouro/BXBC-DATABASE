<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIN MENU</title>
    <style>
        body { background-color: #0c0805; color: #b37446; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; box-sizing: border-box; overflow: hidden; }
        .menu-container { text-align: center; border: 1px solid #b37446; padding: 40px; background-color: rgba(12, 8, 5, 0.95); max-width: 500px; width: 90%; animation: fadeInPanel 2s ease-in-out forwards, breatheGlow 5s ease-in-out infinite 2s; opacity: 0; }
        .menu-container h1 { font-size: 24px; margin: 0 0 35px 0; letter-spacing: 2px; }
        .login-box { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .typewriter-text { font-size: 14px; margin-bottom: 15px; line-height: 1.5; min-height: 40px; }
        .cursor { display: inline-block; width: 10px; background-color: #b37446; animation: blink 0.8s infinite; }
        input { background-color: #050302; border: 1px solid #b37446; color: #b37446; padding: 10px; font-size: 16px; text-align: center; outline: none; width: 70%; }
        .btn { background-color: #b37446; color: #0c0805; border: none; padding: 10px 25px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background-color: #59351c; color: #b37446; }
        .error { color: #ff6666; margin-top: 15px; font-size: 14px; }
        .success { color: #ffb066; margin-top: 15px; font-size: 14px; line-height: 1.6; }
        .menu-options { display: none; flex-direction: column; gap: 15px; align-items: center; opacity: 0; transition: opacity 1s ease; width: 100%; }
        .menu-link { display: block; width: 75%; background-color: transparent; border: 1px solid #b37446; color: #b37446; padding: 12px 20px; font-family: inherit; font-size: 14px; font-weight: bold; text-decoration: none; letter-spacing: 1px; transition: opacity 0.4s ease-in-out; opacity: 1; margin: 0 auto; }
        .menu-link:hover { opacity: 0.15; }
        @keyframes fadeInPanel { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes breatheGlow { 0%, 100% { box-shadow: 0 0 15px rgba(179, 116, 70, 0.15); border-color: rgba(179, 116, 70, 0.5); } 50% { box-shadow: 0 0 35px rgba(179, 116, 70, 0.45); border-color: rgba(179, 116, 70, 1); } }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1 id="title">[ Processing<span id="titleDots"></span> ]</h1>
        
        <div id="loginSection" class="login-box">
            <div class="typewriter-text" id="storyText"></div>
            <input type="text" id="passwordInput" placeholder="Enter key...">
            <button onclick="checkPassword()" class="btn">CLICK ME</button>
            <div id="message"></div>
        </div>

        <div id="menuSection" class="menu-options">
            <a href="characters.html" class="menu-link">CHARACTERS</a>
            <a href="lores.html" class="menu-link">LORES</a>
            <a href="servers.html" class="menu-link">PHOTOS</a>
            <a href="about.html" class="menu-link">SERVERS</a>
            <a href="photos.html" class="menu-link">ABOUT US</a>
        </div>
    </div>

    <script>
        const textToType = "Search the key in #announcements, good luck!";
        let index = 0, speed = 40;
        let titleInterval; 

        function startTitleDots() {
            let titleDotCount = 0;
            document.getElementById("title").innerHTML = "[ Processing<span id='titleDots'></span> ]";
            titleInterval = setInterval(function() {
                titleDotCount = (titleDotCount + 1) % 4;
                document.getElementById("titleDots").innerHTML = ".".repeat(titleDotCount);
            }, 500);
        }

        function startTypewriter() {
            const target = document.getElementById("storyText");
            if (index < textToType.length) {
                target.innerHTML += textToType.charAt(index);
                index++;
                setTimeout(startTypewriter, speed);
            } else {
                target.innerHTML += '<span class="cursor">&nbsp;</span>';
            }
        }

        // 🧠 核心修改：網頁載入時，先檢查玩家是否早就成功解鎖過
        window.onload = function() { 
            if (localStorage.getItem("db_unlocked") === "true") {
                // 如果已經解鎖過，直接隱藏輸入框並展開大廳選單
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("title").innerHTML = "[ LOBBY ]"; 
                const menu = document.getElementById("menuSection");
                menu.style.display = "flex";
                menu.style.opacity = "1";
            } else {
                // 如果沒解鎖過，正常跑打字機和點點動畫
                setTimeout(startTypewriter, 500); 
                startTitleDots(); 
            }
        };

        function checkPassword() {
            const userInput = document.getElementById("passwordInput").value.toLowerCase().trim();
            const messageDiv = document.getElementById("message");

            if (userInput === "save them") {
                clearInterval(titleInterval); 
                document.getElementById("title").innerHTML = "[ SUCCESS ]";
                messageDiv.className = "success";
                messageDiv.innerHTML = "=== OVERRIDE SUCCESSFUL ===<br><br>Amazing.. I didn't expected that at all!<br>Loading<span id='loadingDots'></span>";
                
                // 🧠 儲存解鎖狀態到瀏覽器中（只要不關閉瀏覽器或清除暫存，就會一直記住）
                localStorage.setItem("db_unlocked", "true");

                let dotCount = 0;
                const dotInterval = setInterval(function() {
                    dotCount = (dotCount + 1) % 4;
                    document.getElementById("loadingDots").innerHTML = ".".repeat(dotCount);
                }, 400);

                setTimeout(function() {
                    clearInterval(dotInterval);   
                    document.getElementById("loginSection").style.display = "none";
                    document.getElementById("title").innerHTML = "[ LOBBY ]"; 
                    const menu = document.getElementById("menuSection");
                    menu.style.display = "flex";
                    setTimeout(() => { menu.style.opacity = "1"; }, 50);
                }, 2000);

            } else {
                clearInterval(titleInterval); 
                document.getElementById("title").innerHTML = "<span style='color: #ff6666;'>[ WRONG ]</span>";
                messageDiv.className = "error";
                messageDiv.innerHTML = "[-] INVALID KEY. ACCESS DENIED.";
                
                setTimeout(function() {
                    if (document.getElementById("title").innerText !== "[ SUCCESS ]" && document.getElementById("title").innerText !== "[ LOBBY ]") {
                        startTitleDots();
                    }
                }, 1500);
            }
        }
    </script>
</body>
</html>

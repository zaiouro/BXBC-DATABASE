<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAIN MENU</title>
    <!-- 引入全域樣式表（維持全站十字準星、全螢幕載入優雅淡入） -->
    <link rel="stylesheet" href="theme.css">
    <style>
        /* 解鎖容器主佈局 - 完美置中鎖定 */
        .lobby-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            height: calc(100vh - 100px); 
            max-width: 800px; 
            margin-top: 40px; 
            border: 1px solid #b37446; 
            background: rgba(12,8,5,0.95); 
            padding: 40px; 
            text-align: center; 
            position: relative; 
            overflow: hidden;
            animation: breathe 5s infinite; 
        }

        /* 頂部 [ ACCESS RESTRICTED ] 狀態文字 */
        .process-title {
            font-size: 32px; 
            color: #b37446;
            margin: 0 0 15px 0;
            letter-spacing: 4px;
            font-family: "EB Garamond", serif !important;
            text-transform: uppercase;
        }

        /* 提示引導小字 - 直接用純 CSS 穩定顯現，絕不卡死、不留黑線 */
        .hint-text-box {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 45px;
        }

        .hint-text {
            font-size: 14px;
            color: #8c7361;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-family: "EB Garamond", serif !important;
        }

        /* 密碼輸入框 */
        .key-input {
            width: 100%;
            max-width: 500px;
            background: transparent;
            border: 1px solid #b37446;
            color: #e5bd9c;
            padding: 16px 20px;
            font-size: 20px; 
            letter-spacing: 2px;
            text-align: center;
            outline: none;
            margin-bottom: 30px;
            cursor: text !important;
            transition: all 0.25s ease;
        }
        
        .key-input:focus { box-shadow: 0 0 15px rgba(179, 116, 70, 0.2); border-color: #e5bd9c; }
        .key-input.input-error { border: 1px solid #ff3333 !important; color: #ff3333 !important; box-shadow: 0 0 20px rgba(255, 51, 51, 0.3) !important; }

        /* 點擊按鈕 */
        .submit-btn { width: 100%; max-width: 180px; background: #b37446; border: 1px solid #b37446; color: #0c0805; padding: 14px 20px; font-size: 15px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; transition: all 0.25s ease; }
        .submit-btn:hover { background: transparent; color: #b37446; box-shadow: 0 0 20px rgba(179, 116, 70, 0.4); transform: scale(1.03); }
    </style>
</head>
<body>

    <div class="lobby-container">
        <!-- 頂部防禦代碼標題 -->
        <h1 class="process-title">[ ACCESS RESTRICTED ]</h1>
        
        <!-- 提示文字盒 -->
        <div class="hint-text-box">
            <p class="hint-text">Search the key in #announcements, good luck!</p>
        </div>

        <!-- 密碼輸入方框 -->
        <input type="text" id="terminal-key-field" class="key-input" placeholder="Enter key..." autocomplete="off">

        <!-- 驗證按鍵 -->
        <button onmouseenter="playHoverSound()" onclick="verifySystemKey()" class="submit-btn">CLICK ME</button>
    </div>

    <!-- 💡 只引入全域共用的 menu.js 轉場引擎 -->
    <script src="menu.js"></script>

    <script>
        function verifySystemKey() {
            const inputField = document.getElementById("terminal-key-field");
            const keyValue = inputField.value.trim();
            const CORRECT_KEY = "1983"; 

            if (keyValue === CORRECT_KEY) {
                playSuccessChime(); 
                inputField.classList.remove("input-error");
                
                if (document.body) {
                    document.body.classList.remove("fade-in");
                    document.body.classList.add("fade-out");
                }
                
                // 💡 密碼正確，直接強行引導換頁至 lobby.html
                setTimeout(() => {
                    window.location.href = "lobby.html";
                }, 400);

            } else {
                playAccessDeniedSound(); 
                inputField.classList.add("input-error");
                setTimeout(() => { inputField.classList.remove("input-error"); }, 800);
            }
        }

        function playSuccessChime() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)(); const now = ctx.currentTime;
                let o1 = ctx.createOscillator(), g1 = ctx.createGain(); o1.type = 'triangle'; o1.frequency.setValueAtTime(523.25, now); o1.frequency.setValueAtTime(659.25, now + 0.1); o1.frequency.setValueAtTime(783.99, now + 0.2); g1.gain.setValueAtTime(0.08, now); g1.gain.exponentialRampToValueAtTime(0.001, now + 0.4); o1.connect(g1); g1.connect(ctx.destination); o1.start(); o1.stop(now + 0.4);
            } catch(e) {}
        }

        function playAccessDeniedSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)(); const now = ctx.currentTime;
                let o = ctx.createOscillator(), g = ctx.createGain(); o.type = 'sawtooth'; o.frequency.setValueAtTime(150, now); o.frequency.linearRampToValueAtTime(40, now + 0.35); g.gain.setValueAtTime(0.12, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.35); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(now + 0.35);
            } catch(e) {}
        }

        document.getElementById("terminal-key-field").addEventListener("keydown", (e) => {
            if (e.key === "Enter") { verifySystemKey(); }
        });
    </script>
</body>
</html>

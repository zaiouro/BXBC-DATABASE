<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MAIN MENU</title><link rel="stylesheet" href="theme.css">
<style>
body{
    margin:0;
    min-height:100vh;
    background:#000;
    overflow-x:hidden;
    position:relative;
    transition:opacity .5s ease;
}
body.fade-out{opacity:0;}
body.fade-in{opacity:1;}

/* CRT scanlines */
.crt-scanlines{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:100;
    background:repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
    );
    animation:scanlineScroll 8s linear infinite;
}
@keyframes scanlineScroll{
    0%{background-position:0 0;}
    100%{background-position:0 100px;}
}

/* Dark vignette */
.dark-vignette{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:99;
    background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.8) 100%);
}

/* Blood drip overlay */
.blood-drip{
    position:fixed;
    top:0;right:0;
    width:120px;
    height:300px;
    pointer-events:none;
    z-index:98;
    opacity:0.15;
    background:
        radial-gradient(ellipse at 60% 0%,rgba(120,10,10,0.9) 0%,transparent 70%),
        radial-gradient(ellipse at 80% 0%,rgba(120,10,10,0.7) 0%,transparent 60%);
    animation:bloodPulse 6s ease-in-out infinite alternate;
}
@keyframes bloodPulse{
    0%{opacity:0.1;height:250px;}
    100%{opacity:0.2;height:350px;}
}

/* 恐怖霧氣層 */
.fog-layer{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    pointer-events:none;
    z-index:1;
    background:
        radial-gradient(circle at 20% 30%, rgba(80,10,10,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(80,10,10,0.10) 0%, transparent 50%);
    animation:fogDrift 18s ease-in-out infinite alternate;
}
@keyframes fogDrift{
    0%{transform:translate(0,0) scale(1);}
    100%{transform:translate(3%,-2%) scale(1.1);}
}

/* 漂浮灰燼/火星粒子 */
.ember{
    position:fixed;
    bottom:-10px;
    background:#8b1a1a;
    border-radius:50%;
    box-shadow:0 0 8px 3px rgba(139,26,26,0.8);
    opacity:0;
    pointer-events:none;
    z-index:10;
    animation:emberRise linear infinite;
}
@keyframes emberRise{
    0%{
        transform:translateY(0) translateX(0) scale(0.6);
        opacity:0;
    }
    10%{opacity:0.6;}
    50%{
        transform:translateY(-50vh) translateX(15px) scale(1);
        opacity:0.4;
    }
    90%{opacity:0.15;}
    100%{
        transform:translateY(-105vh) translateX(-10px) scale(0.4);
        opacity:0;
    }
}

.lobby-container{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    height:calc(100vh - 100px);
    height:calc(100dvh - 100px);
    max-width:800px;
    margin:40px auto 0;
    border:1px solid rgba(139,26,26,0.4);
    background:rgba(5,2,2,0.97);
    padding:40px;
    text-align:center;
    position:relative;
    overflow:hidden;
    animation:breathe 5s infinite;
    font-family:"EB Garamond",serif!important;
    z-index:3;
    box-sizing:border-box;
}

.game-title{
    font-size:56px;
    color:#8b1a1a;
    margin:0 0 60px;
    letter-spacing:8px;
    text-transform:uppercase;
    font-family:"EB Garamond",serif;
    position:relative;
    text-shadow:0 0 20px rgba(139,26,26,0.6),0 0 40px rgba(139,26,26,0.3);
    animation:titleFlicker 4s infinite;
}
@keyframes titleFlicker{
    0%,90%,100%{opacity:1;text-shadow:0 0 20px rgba(139,26,26,0.6),0 0 40px rgba(139,26,26,0.3);}
    91%{opacity:0.3;text-shadow:none;}
    92%{opacity:0.9;text-shadow:0 0 10px rgba(139,26,26,0.4);}
    93%{opacity:0.2;text-shadow:none;}
    94%{opacity:1;}
}

.menu-list{
    display:flex;
    flex-direction:column;
    gap:22px;
    align-items:center;
}

.menu-item{
    background:none;
    border:1px solid transparent;
    color:#5a2a2a;
    font-size:24px;
    letter-spacing:6px;
    text-transform:uppercase;
    font-family:"EB Garamond",serif;
    cursor:pointer;
    padding:8px 30px;
    position:relative;
    transition:all .3s ease;
}

.menu-item::before{
    content:"";
    position:absolute;
    left:50%;
    bottom:-2px;
    width:0%;
    height:1px;
    background:#8b1a1a;
    transition:all .3s ease;
    transform:translateX(-50%);
}

.menu-item:hover{
    color:#cc3333;
    border-color:rgba(139,26,26,0.3);
    text-shadow:0 0 12px rgba(139,26,26,0.5);
    letter-spacing:9px;
}

.menu-item:hover::before{
    width:100%;
}

@keyframes breathe{
    0%,100%{box-shadow:0 0 25px rgba(139,26,26,0.08) inset,0 0 60px rgba(0,0,0,0.5);}
    50%{box-shadow:0 0 40px rgba(139,26,26,0.15) inset,0 0 80px rgba(0,0,0,0.7);}
}

.game-subtitle{
    font-size:13px;
    color:rgba(139,26,26,0.5);
    margin:0 0 60px;
    letter-spacing:5px;
    text-transform:uppercase;
    font-family:"EB Garamond",serif;
    text-shadow:0 0 8px rgba(139,26,26,0.2);
}

/* ===== 手機版適配 ===== */
@media (max-width:600px){
    .lobby-container{
        width:92%;
        height:calc(100dvh - 60px);
        margin:30px auto 0;
        padding:30px 20px;
        border-width:1px;
    }
    .game-title{
        font-size:32px;
        letter-spacing:4px;
        margin:0 0 10px;
        line-height:1.3;
    }

.menu-list{
        gap:14px;
        width:100%;
    }
    .menu-item{
        font-size:19px;
        letter-spacing:4px;
        padding:14px 20px;
        width:100%;
        min-height:48px;
    }
    .menu-item:hover{
        letter-spacing:5px;
    }
}

@media (max-width:360px){
    .game-title{
        font-size:26px;
        letter-spacing:3px;
    }
    .menu-item{
        font-size:17px;
        letter-spacing:3px;
    }
}

/* 觸控裝置：拿掉 hover 依賴的效果，改用 active 狀態即時反饋 */
@media (hover:none) and (pointer:coarse){
    .menu-item:active{
        color:#e5bd9c;
        text-shadow:0 0 10px rgba(139,26,26,0.6);
    }
    .menu-item:active::before{
        width:100%;
    }
}
</style>
</head>
<body class="fade-in">
<div class="fog-layer"></div>
<div id="ember-container"></div>

<div class="lobby-container">
    <h1 class="game-title">Last Encore</h1>
    <p class="game-subtitle">Fan-made FNAF AU</p>

    <div class="menu-list">
        <button class="menu-item" onclick="handleMenuClick('enter')">Enter</button>
        <button class="menu-item" onclick="handleMenuClick('options')">Options</button>
        <button class="menu-item" onclick="handleMenuClick('credits')">Credits</button>
        <button class="menu-item" onclick="handleMenuClick('exit')">Exit</button>
    </div>
</div>

<script src="menu.js"></script>
<script>
// The Rust & Gears — eerie piano + synth atmosphere + electropop drums
(function(){
    let started=false;
    let masterGain=null;
    function startMelody(){
        if(started)return;
        started=true;
        try{
            const ctx=new(window.AudioContext||window.webkitAudioContext)();
            masterGain=ctx.createGain();
            const savedVol=localStorage.getItem('fnf_music_volume');
            masterGain.gain.value=savedVol!==null?parseInt(savedVol,10)/100:0.3;
            masterGain.connect(ctx.destination);

            // Expose for options page volume control
            window.getBGM=function(){return{set volume(v){masterGain.gain.value=v;}};};

            // Long reverb — abandoned factory
            const revLen=ctx.sampleRate*5;
            const revBuf=ctx.createBuffer(2,revLen,ctx.sampleRate);
            for(let ch=0;ch<2;ch++){
                const d=revBuf.getChannelData(ch);
                for(let i=0;i<revLen;i++){
                    d[i]=(Math.random()*2-1)*Math.pow(1-i/revLen,4);
                }
            }
            const reverb=ctx.createConvolver();
            reverb.buffer=revBuf;
            const reverbGain=ctx.createGain();
            reverbGain.gain.value=0.5;
            reverb.connect(reverbGain);
            reverbGain.connect(masterGain);

            const dry=ctx.createGain();
            dry.gain.value=0.5;
            dry.connect(masterGain);

            // === PIANO: very sad chords (Am - Dm - Em - Am) ===
            const chords=[
                [220.00,261.63,329.63],
                [146.83,174.61,220.00],
                [164.81,196.00,246.94],
                [220.00,261.63,329.63]
            ];
            let chordIdx=0;

            function playPiano(){
                const chord=chords[chordIdx%chords.length];
                chord.forEach(function(freq,i){
                    setTimeout(function(){
                        const osc=ctx.createOscillator();
                        osc.type='sine';
                        osc.frequency.value=freq;
                        const osc2=ctx.createOscillator();
                        osc2.type='sine';
                        osc2.frequency.value=freq*2;
                        const g2=ctx.createGain();
                        g2.gain.value=0.08;
                        const osc3=ctx.createOscillator();
                        osc3.type='sine';
                        osc3.frequency.value=freq*1.005;
                        const g3=ctx.createGain();
                        g3.gain.value=0.03;

                        const env=ctx.createGain();
                        env.gain.setValueAtTime(0,ctx.currentTime);
                        env.gain.linearRampToValueAtTime(0.08,ctx.currentTime+0.1);
                        env.gain.setValueAtTime(0.08,ctx.currentTime+1.0);
                        env.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+4.5);

                        osc.connect(env);osc2.connect(g2);g2.connect(env);osc3.connect(g3);g3.connect(env);
                        env.connect(dry);env.connect(reverb);
                        osc.start();osc2.start();osc3.start();
                        osc.stop(ctx.currentTime+4.6);osc2.stop(ctx.currentTime+4.6);osc3.stop(ctx.currentTime+4.6);
                    },i*300);
                });
                chordIdx++;
                setTimeout(playPiano,4800);
            }

            // === GUITAR: slow sad arpeggios ===
            const arpNotes=[
                329.63,220.00,261.63,174.61,
                196.00,164.81,146.83,174.61,
                220.00,174.61,196.00,164.81,
                146.83,130.81,146.83,110.00
            ];
            let arpIdx=0;
            function playGuitar(){
                const freq=arpNotes[arpIdx%arpNotes.length];
                const bufLen=Math.floor(ctx.sampleRate*1.5);
                const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);
                const data=buf.getChannelData(0);
                for(let i=0;i<bufLen;i++){
                    const t=i/ctx.sampleRate;
                    data[i]=(Math.sin(2*Math.PI*freq*t)+0.3*Math.sin(2*Math.PI*freq*2*t)+0.12*Math.sin(2*Math.PI*freq*3*t)+0.06*Math.sin(2*Math.PI*freq*5*t))*Math.exp(-t*2.2);
                }
                const src=ctx.createBufferSource();
                src.buffer=buf;
                const filter=ctx.createBiquadFilter();
                filter.type='lowpass';
                filter.frequency.value=2000;
                const env=ctx.createGain();
                env.gain.setValueAtTime(0.08,ctx.currentTime);
                env.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.5);
                src.connect(filter);filter.connect(env);
                env.connect(dry);env.connect(reverb);
                src.start();
                arpIdx++;
                setTimeout(playGuitar,700+Math.random()*200);
            }

            // Start
            setTimeout(playPiano,0);
            setTimeout(playGuitar,200);
        }catch(e){}
    }

    document.addEventListener('click',startMelody,{once:true});
    document.addEventListener('touchstart',startMelody,{once:true});
})();

(function spawnEmbers(){
    const container = document.getElementById('ember-container');
    const count = window.innerWidth <= 600 ? 14 : 25;
    for(let i=0;i<count;i++){
        const ember = document.createElement('div');
        ember.className = 'ember';
        const left = Math.random()*100;
        const duration = 6 + Math.random()*8;
        const delay = Math.random()*10;
        const size = 2 + Math.random()*3;
        ember.style.left = left+'vw';
        ember.style.width = size+'px';
        ember.style.height = size+'px';
        ember.style.animationDuration = duration+'s';
        ember.style.animationDelay = delay+'s';
        container.appendChild(ember);
    }
})();

function playMenuHover(){
    try{
        const c=new(window.AudioContext||window.webkitAudioContext)(),n=c.currentTime;
        let o=c.createOscillator(),g=c.createGain();
        o.type='sine';o.frequency.setValueAtTime(180,n);
        g.gain.setValueAtTime(0.05,n);
        g.gain.exponentialRampToValueAtTime(0.001,n+0.2);
        o.connect(g);g.connect(c.destination);o.start();o.stop(n+0.2)
    }catch(e){}
}

function handleMenuClick(action){
    switch(action){
        case 'enter':
            document.body.classList.remove('fade-in');
            document.body.classList.add('fade-out');
            setTimeout(()=>{window.location.href="lobby.html"},500);
            break;
        case 'options':
            document.body.classList.remove('fade-in');
            document.body.classList.add('fade-out');
            setTimeout(()=>{window.location.href="options.html"},500);
            break;
        case 'credits':
            document.body.classList.remove('fade-in');
            document.body.classList.add('fade-out');
            setTimeout(()=>{window.location.href="credits.html"},500);
            break;
        case 'exit':
            window.close();
            break;
    }
}

document.querySelectorAll('.menu-item').forEach(btn=>{
    btn.addEventListener('mouseenter', playMenuHover);
});
</script>
</body>
</html>
